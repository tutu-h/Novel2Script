server:
  port: 8080

spring:
  application:
    name: novel2script
  datasource:
    url: jdbc:h2:file:./data/novel2script
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB

# LLM Generation Parameters (model is configured via UI)
llm:
  max-tokens: 8192
  temperature: 0.7

# App Configuration
app:
  export-dir: ./exports
