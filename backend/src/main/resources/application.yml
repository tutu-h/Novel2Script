server:
  port: 8080

spring:
  application:
    name: novel2script
  datasource:
    url: jdbc:h2:file:./data/novel2script
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB

# DeepSeek API Configuration
deepseek:
  api-key: ${DEEPSEEK_API_KEY:}
  base-url: ${DEEPSEEK_BASE_URL:https://api.deepseek.com}
  model: ${DEEPSEEK_MODEL:deepseek-chat}
  max-tokens: ${MAX_TOKENS:8192}
  temperature: ${TEMPERATURE:0.7}

# App Configuration
app:
  export-dir: ./exports
